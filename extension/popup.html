<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Bridge</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell" aria-labelledby="product-name">
      <header class="brand-row">
        <img class="brand-mark" src="icons/icon-48.png" alt="">
        <div>
          <h1 id="product-name">Chrome Bridge</h1>
          <p>Trusted local automation</p>
        </div>
      </header>

      <section class="connection" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <div>
          <strong id="connection-status">Checking</strong>
          <span id="connection-detail">Native host status</span>
        </div>
      </section>

      <section class="task-panel" aria-labelledby="active-task-label">
        <div class="eyebrow" id="active-task-label">Active task</div>
        <div class="task-row">
          <span id="task-symbol" class="task-symbol" aria-hidden="true">✦</span>
          <div>
            <strong id="active-task">No active task</strong>
            <span id="task-state">Ready when you are</span>
          </div>
        </div>
      </section>

      <section class="settings" aria-label="Chrome Bridge settings">
        <div class="setting-row">
          <div>
            <strong>Quiet reads</strong>
            <span>Text, HTML, and waits</span>
          </div>
          <span class="on-label">On</span>
        </div>
        <div class="rule"></div>
        <div class="setting-row pointer-setting">
          <label for="pointer-toggle">
            <strong>Show agent pointer</strong>
            <span>Only on the tab you are viewing</span>
          </label>
          <button id="pointer-toggle" class="toggle" type="button" role="switch" aria-checked="true" aria-label="Show agent pointer">
            <span></span>
          </button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
